  <text x="30" y="48" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="12" fill="#8a8a82">Percentage of disability-adjusted life years (DALYs)</text>
  <!-- Donut: centre at 350,155, outer r=95, inner r=55 -->
  <!-- NCD 78% = 280.8 degrees, Communicable 22% = 79.2 degrees -->
  <!-- Start at top (12 o'clock). NCD arc from -90 to 190.8 degrees -->
  <!-- NCD arc: startAngle=-90, endAngle=190.8 -->
  <!-- Start: 350+95*cos(-90deg)=350, 155+95*sin(-90deg)=60 -->
  <!-- End of NCD: angle=190.8deg => 350+95*cos(190.8*pi/180)=350+95*cos(3.331)=350+95*(-0.982)=350-93.3=256.7, 155+95*sin(3.331)=155+95*(-0.1874)=155-17.8=137.2 -->
  <!-- Communicable: from 190.8 to 270 degrees (back to top) -->
  <!-- End: 350+95*cos(270*pi/180)=350, 155-95=60 -->
  <!-- NCD path (large arc) -->
  <path d="M350,60 A95,95 0 1,1 256.7,137.2 L291.8,141.3 A55,55 0 1,0 350,100 Z" fill="#4A5E80"/>
  <!-- Better approach: use precise calculations -->
  <!-- NCD: 78% = 0.78 * 360 = 280.8 degrees -->
  <!-- From 12 o'clock clockwise: start angle = -PI/2 -->
  <!-- End angle for NCD = -PI/2 + 280.8 * PI/180 = -1.5708 + 4.9009 = 3.3301 rad -->
  <!-- NCD outer end: x=350+95*cos(3.3301)=350-93.27=256.73, y=155+95*sin(3.3301)=155-17.81=137.19 -->
  <!-- NCD inner end: x=350+55*cos(3.3301)=350-54.0=296.0, y=155+55*sin(3.3301)=155-10.31=144.69 -->
  <!-- Communicable outer end: back to top = 350,60 -->
  <!-- Communicable inner end: 350,100 -->
  <path d="M350,60 A95,95 0 1,1 256.73,137.19 L296.0,144.69 A55,55 0 1,0 350,100 Z" fill="#4A5E80"/>
  <path d="M256.73,137.19 A95,95 0 0,1 350,60 L350,100 A55,55 0 0,0 296.0,144.69 Z" fill="#7A8F7E"/>

  <text x="520" y="132" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="12" fill="#555">NCDs (incl. injuries) 78%</text>

  <!-- Source and credit -->

  <text x="670" y="260" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" fill="#aaa" text-anchor="end">Visualization by Public Policy Lab @policylabmv</text>
