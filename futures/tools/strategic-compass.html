<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-family-sans: 'Inter', sans-serif;
            --font-family-display: 'Manrope', sans-serif;
            --color-political: #4f46e5;
            --color-economic: #16a34a;
            --color-social: #db2777;
            --color-technological: #0891b2;
            --color-legal: #d97706;
            --color-environmental: #65a30d;
        }
        body {
            font-family: var(--font-family-sans);
            background-color: #f0f2f5; /* A richer, more modern off-white */
            color: #334155;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Subtle background pattern for texture */
            background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239ca3af' fill-opacity='0.07'%3E%3Cpath d='M5 0h1L0 6V5zM6 5v1H0L6 0h-1z'/%3E%3C/g%3E%3C/svg%3E");
        }
        h1, h2, h3, h4 { font-family: var(--font-family-display); }
        h1 { letter-spacing: -0.04em; }
        h2 { line-height: 1.3; }
        .column-header {
            font-family: var(--font-family-sans);
            letter-spacing: 0.05em;
            color: #64748b; /* Slate 500 */
        }
        .chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            background-color: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            padding-left: 20px; /* Space for the colored line */
        }
        .chip::before { /* The colored PESTLE line */
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background-color: var(--pestle-color, #cbd5e1); /* Default to grey */
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chip:hover {
             border-color: #cbd5e1;
             box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
             transform: translateY(-2px);
        }
        .chip:hover::before { width: 8px; }
        .chip-enter {
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }
        .chip-description {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pestle-filter-active {
            box-shadow: 0 0 0 2px #f0f2f5, 0 0 0 4px var(--tw-ring-color);
        }
        .main-container.is-filtering .chip:not(.highlight) {
            opacity: 0.4;
            transform: scale(0.98);
        }
        .side-panel {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
        }
        *:focus-visible {
            outline: 2px solid var(--color-political) !important;
            outline-offset: 2px !important;
        }
        .add-btn {
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Inline SVG definitions for PESTLE icons -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <symbol id="icon-political" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a2 2 0 00-2 2v11a3 3 0 106 0V4a2 2 0 00-2-2H4zm1 14a1 1 0 100-2 1 1 0 000 2zm5-1.75a.75.75 0 00-1.5 0V15a.75.75 0 001.5 0v-2.75zM15 4a.75.75 0 01.75-.75h.01a.75.75 0 01.75.75v10.5a.75.75 0 01-1.5 0V4zM12.25 15a.75.75 0 00-1.5 0v.01a.75.75 0 001.5 0V15z" clip-rule="evenodd" /></symbol>
        <symbol id="icon-economic" viewBox="0 0 20 20" fill="currentColor"><path d="M1 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-1 1H2a1 1 0 01-1-1V4zM2 9.5a.5.5 0 01.5-.5h15a.5.5 0 01.5.5v2a.5.5 0 01-.5.5h-15a.5.5 0 01-.5-.5v-2zM2 15a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-1 1H2a1 1 0 01-1-1v-2z" /></symbol>
        <symbol id="icon-social" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zM6 8a2 2 0 11-4 0 2 2 0 014 0zM1.49 15.326a.78.78 0 01-.358-.442 3 3 0 014.308-3.516 6.484 6.484 0 00-1.905 3.959c-.023.222-.014.442.028.658a1 1 0 01-1.54.794zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15.425c.03-.224.04-.44.022-.659a6.483 6.483 0 00-1.9-3.96 3 3 0 014.309 3.516.78.78 0 01-.357.442 1 1 0 01-1.54-.794zM10 18a-3.453 3.453 0 00-2.343.834.75.75 0 001.06 1.06 1.953 1.953 0 012.566 0 .75.75 0 101.06-1.06A3.453 3.453 0 0010 18z" /></symbol>
        <symbol id="icon-technological" viewBox="0 0 20 20" fill="currentColor"><path d="M11.723 3.723a.75.75 0 01.028 1.06l-3.5 3.5a.75.75 0 01-1.06-1.06l3.5-3.5a.75.75 0 011.032 0zM16.723 8.723a.75.75 0 01.028 1.06l-3.5 3.5a.75.75 0 01-1.06-1.06l3.5-3.5a.75.75 0 011.032 0zM12.928 11.072a.75.75 0 011.06.028l3.5 3.5a.75.75 0 01-1.06 1.06l-3.5-3.5a.75.75 0 01.002-1.088zM9.05 12.45a.75.75 0 00-1.06-1.06l-3.5 3.5a.75.75 0 001.06 1.06l3.5-3.5zM6.5 5a.75.75 0 01.75-.75h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75h-.008A.75.75 0 016.5 5zM5.75 8a.75.75 0 00-.75.75v.008c0 .414.336.75.75.75h.008a.75.75 0 00.75-.75V8.75a.75.75 0 00-.75-.75H5.75z" /></symbol>
        <symbol id="icon-legal" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M1 2.75A.75.75 0 011.75 2h16.5a.75.75 0 010 1.5H1.75A.75.75 0 011 2.75zm0 5A.75.75 0 011.75 7h16.5a.75.75 0 010 1.5H1.75A.75.75 0 011 7.75zM1.75 12a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5H1.75zM1 17.25a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H1.75a.75.75 0 01-.75-.75z" clip-rule="evenodd" /></symbol>
        <symbol id="icon-environmental" viewBox="0 0 20 20" fill="currentColor"><path d="M15.5 2.25a.75.75 0 01.29.549l.067 1.003a.75.75 0 11-1.49-.1l-.067-1.003a.75.75 0 011.192-.45zM3.808 2.701a.75.75 0 011.192.45l-.068 1.003a.75.75 0 01-1.49-.1l.068-1.003a.75.75 0 01.29-.549zM10 2.5a.75.75 0 01.75.75v1.25a.75.75 0 01-1.5 0V3.25A.75.75 0 0110 2.5zM9.999 7.75a2.25 2.25 0 100 4.5 2.25 2.25 0 000-4.5zM12.25 9.25a3.75 3.75 0 11-4.5 0v-1.5a.75.75 0 011.5 0v1.5a2.25 2.25 0 101.5 0v-1.5a.75.75 0 011.5 0v1.5zM12.92 13.92a.75.75 0 011.06 1.06l-.001.002-2.58 2.578a.75.75 0 11-1.06-1.06l2.58-2.58.001-.002zM7.08 13.92a.75.75 0 00-1.06 1.06l2.58 2.58.001.001a.75.75 0 101.06-1.06l-2.58-2.58z" /></symbol>
      </defs>
    </svg>

    <div id="app-container" class="h-screen w-screen flex flex-col p-6 md:p-8 space-y-6">
        <div class="flex flex-col items-center space-y-6 px-4 pt-8">
            <div id="pestle-filters" class="flex flex-wrap justify-center gap-2 items-center"></div>
        </div>

        <main id="main-container" class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8 overflow-hidden pb-4">
            <section class="flex flex-col bg-white/50 border border-slate-200/80 rounded-xl">
                <h3 class="column-header text-sm font-semibold uppercase text-center py-4 border-b border-slate-200">Pushes of the Present</h3>
                <div id="pushes-container" class="flex-1 overflow-y-auto space-y-3 p-4"></div>
                <button onclick="openModal('push')" class="add-btn m-4 mt-auto border border-slate-300 text-slate-600 font-semibold py-2 px-4 rounded-lg hover:bg-white hover:border-slate-400 transition-colors">+ Add Push</button>
            </section>
            <section class="flex flex-col bg-indigo-50/30 border border-indigo-200/80 rounded-xl">
                <h3 class="column-header text-sm font-semibold text-indigo-800/80 uppercase text-center py-4 border-b border-indigo-200/80">Pulls of the Future</h3>
                <div id="pulls-container" class="flex-1 overflow-y-auto space-y-3 p-4"></div>
                <button onclick="openModal('pull')" class="add-btn m-4 mt-auto border border-indigo-300 text-indigo-700 font-semibold py-2 px-4 rounded-lg hover:bg-white hover:border-indigo-400 transition-colors">+ Add Pull</button>
            </section>
            <section class="flex flex-col bg-white/50 border border-slate-200/80 rounded-xl">
                <h3 class="column-header text-sm font-semibold uppercase text-center py-4 border-b border-slate-200">Weights of the Past</h3>
                <div id="weights-container" class="flex-1 overflow-y-auto space-y-3 p-4"></div>
                <button onclick="openModal('weight')" class="add-btn m-4 mt-auto border border-slate-300 text-slate-600 font-semibold py-2 px-4 rounded-lg hover:bg-white hover:border-slate-400 transition-colors">+ Add Weight</button>
            </section>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-40 hidden">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 transform transition-all opacity-0 -translate-y-4">
            <h2 id="modal-title" class="text-2xl font-bold text-slate-800 mb-6"></h2>
            <form id="modal-form">
                <input type="hidden" id="modal-item-id"><input type="hidden" id="modal-item-type">
                <div>
                    <label for="item-title" class="block text-sm font-medium text-slate-600">Title</label>
                    <input type="text" id="item-title" required class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div class="mt-4">
                    <label for="item-description" class="block text-sm font-medium text-slate-600">Description</label>
                    <textarea id="item-description" rows="4" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 sm:text-sm"></textarea>
                </div>
                <div id="pestle-selector" class="mt-5 hidden">
                    <label class="block text-sm font-medium text-slate-600 mb-2">PESTLE Category</label>
                    <div id="pestle-options" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="mt-8 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-lg hover:bg-slate-200 transition-colors">Cancel</button>
                    <button type="submit" class="bg-indigo-600 text-white font-semibold py-2 px-5 rounded-lg hover:bg-indigo-700 transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="side-panel" class="side-panel fixed top-0 right-0 h-full w-full max-w-md shadow-2xl z-50 p-8 transform translate-x-full border-l border-slate-200">
        <div class="flex justify-between items-start mb-6">
            <h2 id="panel-title" class="text-3xl font-bold text-slate-900 pr-4"></h2>
            <button onclick="closeSidePanel()" class="text-2xl text-slate-500 hover:text-slate-800 transition-colors">&times;</button>
        </div>
        <div id="panel-pestle" class="mb-5"></div>
        <p id="panel-content" class="text-slate-600 leading-relaxed"></p>
         <div id="panel-actions" class="mt-8 pt-6 border-t border-slate-200 space-y-2"></div>
    </div>


<script>
    let state = {
        pushes: [ { id: `p_1`, title: "Rising Sea Levels", description: "Coastal erosion and infrastructure risk are increasing due to climate change." }, { id: `p_2`, title: "Youth Emigration", description: "Young, skilled individuals are leaving for opportunities abroad, creating a 'brain drain'." } ],
        pulls: [ { id: `u_1`, title: "Diversified Blue Economy", description: "Leveraging marine resources sustainably to create new industries beyond tourism, such as mariculture and marine biotechnology.", pestle: "Economic" }, { id: `u_2`, title: "Carbon Neutrality by 2030", description: "A national goal to transition to 100% renewable energy and implement green policies.", pestle: "Environmental" }, { id: `u_3`, title: "Digital Governance & Services", description: "Moving all government services online to increase efficiency and accessibility for citizens across all islands.", pestle: "Technological"} ],
        weights: [ { id: `w_1`, title: "Import Dependency", description: "Heavy reliance on imported food, fuel, and materials makes the economy vulnerable to global supply chain disruptions." }, { id: `w_2`, title: "Centralized Infrastructure", description: "Most critical infrastructure and services are concentrated in the capital, Malé, creating congestion and inequality." } ],
        activeFilter: null
    };

    const PESTLE_CATEGORIES = {
        Political: { color: 'var(--color-political)', icon: 'political' }, Economic: { color: 'var(--color-economic)', icon: 'economic' }, Social: { color: 'var(--color-social)', icon: 'social' }, Technological: { color: 'var(--color-technological)', icon: 'technological' }, Legal: { color: 'var(--color-legal)', icon: 'legal' }, Environmental: { color: 'var(--color-environmental)', icon: 'environmental' }
    };
    
    const dom = {
        mainContainer: document.getElementById('main-container'),
        pushesContainer: document.getElementById('pushes-container'),
        pullsContainer: document.getElementById('pulls-container'),
        weightsContainer: document.getElementById('weights-container'),
        modal: document.getElementById('modal'),
        modalContent: document.getElementById('modal-content'),
        modalForm: document.getElementById('modal-form'),
        modalTitle: document.getElementById('modal-title'),
        modalItemId: document.getElementById('modal-item-id'),
        modalItemType: document.getElementById('modal-item-type'),
        itemTitle: document.getElementById('item-title'),
        itemDescription: document.getElementById('item-description'),
        pestleSelector: document.getElementById('pestle-selector'),
        pestleOptions: document.getElementById('pestle-options'),
        sidePanel: document.getElementById('side-panel'),
        panelTitle: document.getElementById('panel-title'),
        panelContent: document.getElementById('panel-content'),
        panelPestle: document.getElementById('panel-pestle'),
        panelActions: document.getElementById('panel-actions'),
        pestleFilters: document.getElementById('pestle-filters'),
    };
    
    function createChip(item, type) {
        const chip = document.createElement('div');
        chip.className = 'chip p-4 rounded-lg cursor-pointer';
        chip.dataset.id = item.id;
        chip.dataset.type = type;
        
        let header = `<div class="flex items-center gap-3"><h4 class="font-semibold text-slate-800 text-base leading-tight">${item.title}</h4></div>`;
        if (type === 'pull') {
            const category = PESTLE_CATEGORIES[item.pestle];
            chip.style.setProperty('--pestle-color', category.color);
            chip.classList.add(`chip-${item.pestle.toLowerCase()}`);
            header = `<div class="flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" style="color: ${category.color};"><use href="#icon-${category.icon}"></use></svg>
                        <h4 class="font-semibold text-slate-800 text-base leading-tight">${item.title}</h4>
                      </div>`;
        }
        
        chip.innerHTML = `${header}<p class="chip-description text-slate-500 text-sm mt-2">${item.description || ''}</p>`;
        chip.addEventListener('click', () => openSidePanel(item.id, type));
        chip.classList.add('chip-enter');
        requestAnimationFrame(() => { chip.classList.remove('chip-enter'); });
        return chip;
    }

    function render() {
        dom.pushesContainer.innerHTML = ''; state.pushes.forEach(item => dom.pushesContainer.appendChild(createChip(item, 'push')));
        dom.pullsContainer.innerHTML = ''; state.pulls.forEach(item => dom.pullsContainer.appendChild(createChip(item, 'pull')));
        dom.weightsContainer.innerHTML = ''; state.weights.forEach(item => dom.weightsContainer.appendChild(createChip(item, 'weight')));
        applyFilter(state.activeFilter, true);
    }
    
    function renderPestleOptions(container, selected = null) {
        container.innerHTML = '';
        Object.keys(PESTLE_CATEGORIES).forEach(category => {
            const option = document.createElement('div');
            const cat = PESTLE_CATEGORIES[category];
            option.innerHTML = `<input type="radio" name="pestle" id="pestle-${category}" value="${category}" class="sr-only" ${selected === category ? 'checked' : ''}><label for="pestle-${category}" class="flex items-center gap-2 cursor-pointer px-3 py-1.5 rounded-full border text-sm font-medium transition-colors" style="--ring-color: ${cat.color};"><svg class="w-4 h-4"><use href="#icon-${cat.icon}"></use></svg> ${category}</label>`;
            container.appendChild(option);
        });
        updatePestleLabelStyles();
    }

    function updatePestleLabelStyles() {
        document.querySelectorAll('#pestle-options label').forEach(label => {
            const input = document.getElementById(label.htmlFor);
            if (input.checked) {
                label.style.backgroundColor = PESTLE_CATEGORIES[input.value].color;
                label.style.color = 'white';
                label.style.borderColor = PESTLE_CATEGORIES[input.value].color;
            } else {
                label.style.backgroundColor = 'transparent';
                label.style.color = '#334155';
                label.style.borderColor = '#cbd5e1';
            }
        });
    }

    function renderPestleFilters() {
        dom.pestleFilters.innerHTML = '<span class="text-sm font-semibold text-slate-500 mr-3">Filter Pulls:</span>';
        Object.keys(PESTLE_CATEGORIES).forEach(category => {
            const btn = document.createElement('button');
            const cat = PESTLE_CATEGORIES[category];
            btn.className = 'flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold transition-all duration-200';
            btn.innerHTML = `<svg class="w-3.5 h-3.5"><use href="#icon-${cat.icon}"></use></svg>${category}`;
            btn.style.setProperty('--tw-ring-color', cat.color);
            btn.style.backgroundColor = cat.color + '1A';
            btn.style.color = cat.color;
            btn.onclick = () => applyFilter(category);
            dom.pestleFilters.appendChild(btn);
        });
    }

    function openModal(type, id = null) {
        dom.modalForm.reset();
        const isEditing = id !== null;
        let item = {};
        dom.modalItemType.value = type; dom.modalItemId.value = id || '';
        if(isEditing) {
            item = state[type + 's'].find(i => i.id === id);
            dom.itemTitle.value = item.title; dom.itemDescription.value = item.description || '';
            dom.modalTitle.textContent = `Edit ${type.charAt(0).toUpperCase() + type.slice(1)}`;
        } else { dom.modalTitle.textContent = `Add New ${type.charAt(0).toUpperCase() + type.slice(1)}`; }
        if (type === 'pull') {
            renderPestleOptions(dom.pestleOptions, isEditing ? item.pestle : Object.keys(PESTLE_CATEGORIES)[0]);
            dom.pestleSelector.classList.remove('hidden');
        } else { dom.pestleSelector.classList.add('hidden'); }
        dom.modal.classList.remove('hidden');
        requestAnimationFrame(() => { dom.modalContent.classList.remove('opacity-0', '-translate-y-4'); });
        
        // Focus on the title input for better UX
        setTimeout(() => dom.itemTitle.focus(), 100);
    }

    function closeModal() {
        dom.modalContent.classList.add('opacity-0', '-translate-y-4');
        setTimeout(() => dom.modal.classList.add('hidden'), 200);
    }
    
    function openSidePanel(id, type) {
        const item = state[type + 's'].find(i => i.id === id);
        if (!item) return;
        dom.panelTitle.textContent = item.title;
        dom.panelContent.textContent = item.description || 'No description provided.';
        if (type === 'pull' && item.pestle) {
            const category = PESTLE_CATEGORIES[item.pestle];
            dom.panelPestle.innerHTML = `<span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium" style="background-color: ${category.color}20; color: ${category.color};"><svg class="w-5 h-5"><use href="#icon-${category.icon}"></use></svg>${item.pestle}</span>`;
            dom.panelPestle.classList.remove('hidden');
        } else { dom.panelPestle.classList.add('hidden'); }
        dom.panelActions.innerHTML = '';
        const editBtn = document.createElement('button');
        editBtn.className = 'w-full bg-slate-100 text-slate-700 font-semibold py-2.5 px-4 rounded-lg hover:bg-slate-200 transition-colors text-center';
        editBtn.textContent = 'Edit';
        editBtn.onclick = () => { closeSidePanel(); openModal(type, id); };
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'w-full bg-red-50 text-red-600 font-semibold py-2.5 px-4 rounded-lg hover:bg-red-100 transition-colors text-center';
        deleteBtn.textContent = 'Delete';
        deleteBtn.onclick = () => {
            deleteBtn.textContent = 'Are you sure?';
            deleteBtn.className = 'w-full bg-red-600 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-center';
            deleteBtn.onclick = () => deleteItem(id, type);
        };
        dom.panelActions.appendChild(editBtn);
        dom.panelActions.appendChild(deleteBtn);
        dom.sidePanel.classList.remove('translate-x-full');
    }

    function closeSidePanel() { dom.sidePanel.classList.add('translate-x-full'); }
    
    function handleFormSubmit(event) {
        console.log('handleFormSubmit called');
        event.preventDefault();
        const id = dom.modalItemId.value; const type = dom.modalItemType.value; 
        const collection = type === 'push' ? 'pushes' : type === 'pull' ? 'pulls' : 'weights';
        const title = dom.itemTitle.value.trim();
        const description = dom.itemDescription.value.trim();
        
        console.log('Form data:', { id, type, collection, title, description });
        
        // Validate required fields
        if (!title) {
            console.log('Title is empty, showing alert');
            alert('Please enter a title');
            return;
        }
        
        console.log('Title validation passed');
        
        const newItemData = { title: title, description: description };
        if (type === 'pull') { newItemData.pestle = dom.modalForm.querySelector('input[name="pestle"]:checked').value; }
        
        console.log('New item data:', newItemData);
        
        if (id) {
            const itemIndex = state[collection].findIndex(i => i.id === id);
            state[collection][itemIndex] = { ...state[collection][itemIndex], ...newItemData };
            console.log('Updated existing item');
        } else {
            newItemData.id = `${type.charAt(0)}_${Date.now()}`;
            state[collection].push(newItemData);
            console.log('Added new item:', newItemData);
        }
        
        console.log('Current state:', state);
        closeModal(); render();
    }

    function deleteItem(id, type) {
        const collection = type + 's';
        state[collection] = state[collection].filter(item => item.id !== id);
        closeSidePanel(); render();
    }
    
    function applyFilter(category, force = false) {
        state.activeFilter = (!force && state.activeFilter === category) ? null : category;
        dom.pestleFilters.querySelectorAll('button').forEach(btn => {
            btn.classList.toggle('pestle-filter-active', btn.innerHTML.includes(category));
        });
        dom.mainContainer.classList.toggle('is-filtering', !!state.activeFilter);
        dom.pullsContainer.querySelectorAll('.chip').forEach(chip => {
            const item = state.pulls.find(p => p.id === chip.dataset.id);
            chip.classList.toggle('highlight', item && item.pestle === state.activeFilter);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Debug DOM elements
        console.log('DOM loaded, checking elements:');
        console.log('modalForm:', dom.modalForm);
        console.log('itemTitle:', dom.itemTitle);
        console.log('itemDescription:', dom.itemDescription);
        
        // Add form submission listener with debugging
        if (dom.modalForm) {
            dom.modalForm.addEventListener('submit', function(e) {
                console.log('Form submit event triggered');
                handleFormSubmit(e);
            });
            
            // Also add click listener to submit button as backup
            const submitBtn = dom.modalForm.querySelector('button[type="submit"]');
            console.log('Submit button found:', submitBtn);
            if (submitBtn) {
                submitBtn.addEventListener('click', function(e) {
                    console.log('Submit button clicked');
                    e.preventDefault();
                    handleFormSubmit(e);
                });
            }
        } else {
            console.error('Modal form not found!');
        }
        
        if (dom.pestleOptions) {
            dom.pestleOptions.addEventListener('change', updatePestleLabelStyles);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!dom.modal.classList.contains('hidden')) closeModal();
                if (!dom.sidePanel.classList.contains('translate-x-full')) closeSidePanel();
            }
        });
        renderPestleFilters(); render();
    });
</script>

</body>
</html>
